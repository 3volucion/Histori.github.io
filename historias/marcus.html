<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia de Marcus</title>
    <link rel="stylesheet" href="../css/estilos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="story-page">
    <header class="story-header">
        <div class="story-header-content">
            <a href="../index.html" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Volver
            </a>
            <span class="logo">HISTORIA EVOLUCIÓN</span>
        </div>
    </header>

    <main class="story-main">
        <h1 class="story-title-page">HISTORIA DE MARCUS</h1>

        <ul class="chapter-list" id="chapterList">
            <li class="chapter-item">
                <a href="marcus-reader.html?cap=1" class="chapter-link">
                    <div class="chapter-title">El comienzo</div>
                </a>
            </li>
        </ul>
    </main>

    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('../data/marcus.json');
                const data = await response.json();
                const chapterList = document.getElementById('chapterList');

                if (data.capitulos && data.capitulos.length > 0) {
                    chapterList.innerHTML = data.capitulos.map(cap => `
                        <li class="chapter-item">
                            <a href="marcus-reader.html?cap=${cap.numero}" class="chapter-link">
                                <div class="chapter-title">${cap.titulo}</div>
                            </a>
                        </li>
                    `).join('');
                }
            } catch (error) {
                console.log('Usando capítulos por defecto');
            }
        });
    </script>
</body>
</html>
